warning.strawberry.soil.too.wet=Почвата е прекалено мокра – риск от гниене на корените.
warning.strawberry.soil.critical.low=Критично ниска влажност – възможно завяхване.
warning.strawberry.temp.low=Температурата е твърде ниска за ягоди – риск от застой в развитието.
warning.strawberry.temp.high=Прекалено висока температура – възможен топлинен и воден стрес.
warning.strawberry.botrytis=Висока влажност и умерена температура – риск от сиво гниене (Botrytis cinerea).
warning.strawberry.powdery.mildew=Топло и влажно време – възможна поява на брашнеста мана по листата.
warning.strawberry.hot.dry=Сух и горещ въздух – риск от загуба на влага, пригори и по-слабо плододаване.
warning.strawberry.root.rot=Хладно и влажно време – възможно развитие на кореново гниене (Phytophthora fragariae).
warning.strawberry.fruit.mold=Продължителна влажност – възможна поява на сиво гниене и плесен върху плодовете.
warning.strawberry.heat.stress=Горещо и сухо време – растенията изпитват стрес, възможно спиране на плододаването.
warning.strawberry.low.light=Недостатъчно осветление – растенията може да забавят растежа и плододаването.
warning.strawberry.high.light=Прекалено силно осветление – възможен стрес за растенията, риск от изгаряне на листата.

warning.potato.soil.too.wet=Почвата е прекалено мокра – риск от гниене на клубените.
warning.potato.soil.critical.low=Критично ниска влажност – възможно завяхване.
warning.potato.temp.low=Температурата е твърде ниска – риск от застой в развитието.
warning.potato.temp.high=Прекалено висока температура – възможен топлинен и воден стрес.
warning.potato.mildew=Висока влажност и умерена температура – риск от мана по картофите (Phytophthora infestans).
warning.potato.alternaria=Топло и влажно време – възможна поява на алтернария (кафяви петна по листата).
warning.potato.gray.mold=Почвата е прекалено влажна и хладна – възможно развитие на сиво гниене (Botrytis).
warning.potato.heat.dry=Горещо и сухо време – риск от воден стрес и деформирани клубени.
warning.potato.bacterial.rot=Продължителна висока влажност и ниска температура – възможно развитие на бактериални гниения.
warning.potato.low.light=Недостатъчно осветление – растенията може да забавят растежа и плододаването.
warning.potato.high.light=Прекалено силно осветление – възможен стрес за растенията, риск от изгаряне на листата.

warning.carrot.soil.too.wet=Почвата е прекалено мокра – риск от кореново гниене.
warning.carrot.soil.critical.low=Критично ниска влажност – възможна деформация на корените.
warning.carrot.temp.low=Температурата е твърде ниска – риск от застой в развитието.
warning.carrot.temp.high=Прекалено висока температура – риск от преждевременно цъфтеж или горчив вкус.
warning.carrot.humidity.low=Влажността на въздуха е твърде ниска – ускорено изпарение и стрес за растенията.
warning.carrot.humidity.high=Влажността на въздуха е прекалено висока – риск от брашнеста мана и бактериални инфекции.
warning.carrot.soil.air.high.moisture=Висока влажност на въздуха и почвата – риск от плесен и гниене на корените.
warning.carrot.alternaria=Висока температура и влажност – риск от алтернария (черно листно петно).
warning.carrot.sclerotinia=Прекалено влажна среда – възможна бяла плесен (Sclerotinia).
warning.carrot.root.rot=Топла и влажна почва – риск от кореново гниене.
warning.carrot.low.light=Недостатъчно осветление – растенията може да забавят растежа и плододаването.
warning.carrot.high.light=Прекалено силно осветление – възможен стрес за растенията, риск от изгаряне на листата.

warning.tomato.soil.too.wet=Почвата е прекалено мокра – риск от гниене на корените.
warning.tomato.soil.critical.low=Критично ниска влажност – възможно завяхване.
warning.tomato.temp.low=Температурата е твърде ниска за домати.
warning.tomato.temp.high=Температурата е твърде висока – риск от стрес.
warning.tomato.mildew=Висока влажност и умерена температура – идеални условия за мана (Phytophthora infestans).
warning.tomato.fungal.infections=Топло и влажно време – риск от брашнеста мана и гъбични инфекции по листата.
warning.tomato.heat.dry.stress=Сух и горещ въздух – възможен стрес и върхово гниене (дефицит на калций).
warning.tomato.moisture.excess=Продължителна влажност на почвата и въздуха – риск от мана и бактериално петносване.
warning.tomato.fruit.deformation=Горещо и сухо време – риск от пригори и деформации на плодовете.
warning.tomato.heat.shock=Изключително горещо и сухо – възможен топлинен шок и спиране на растежа.
warning.tomato.bacterial.diseases=Хладно и влажно време – риск от бактериални болести по стъблата и листата.
warning.tomato.low.light=Недостатъчно осветление – растенията може да забавят растежа и плододаването.
warning.tomato.high.light=Прекалено силно осветление – риск от изгаряне на листата.

phase.carrot.initial.name=Начален етап
phase.carrot.initial.description=Поникване и формиране на първите листа. Поддържай почвата постоянно влажна. Избягвай преовлажняване.
phase.carrot.development.name=Развитие на културата
phase.carrot.development.description=Интензивно нарастване на листната маса и начално формиране на кореноплода. Поливай редовно и премахвай плевелите.
phase.carrot.midseason.name=Среден сезон
phase.carrot.midseason.description=Основно нарастване на кореноплода. Осигури равномерна влажност. Недостигът на вода намалява добива и качеството.
phase.carrot.late.name=Късен сезон и узряване
phase.carrot.late.description=Кореноплодите достигат окончателния си размер. Намали поливките преди прибиране за по-добро съхранение.
phase.carrot.unknown.name=Неизвестно
phase.carrot.unknown.description=Няма информация.

phase.potato.initial.name=Начален етап
phase.potato.initial.description=Засаждане, покълване и поникване. Поддържай почвата умерено влажна. Избягвай преовлажняване и уплътняване на почвата.
phase.potato.development.name=Развитие на културата
phase.potato.development.description=Интензивно нарастване на листната маса. Извърши загърляне (окучване) и контролирай плевелите. Поливай редовно.
phase.potato.midseason.name=Среден сезон
phase.potato.midseason.description=Цъфтеж и активно нарастване на клубените. Това е периодът с най-висока нужда от вода. Поддържай равномерна влажност и следи за мана и колорадски бръмбар.
phase.potato.late.name=Късен сезон и узряване
phase.potato.late.description=Клубените достигат окончателен размер и започва узряване. Намалявай постепенно поливките. Подготви културата за прибиране.
phase.potato.unknown.name=Неизвестно
phase.potato.unknown.description=Няма информация.

phase.strawberry.initial.name=Начален етап
phase.strawberry.initial.description=Вкореняване и прихващане на растенията. Поддържай постоянна влажност.
phase.strawberry.development.name=Развитие на културата
phase.strawberry.development.description=Интензивно развитие на листна маса и цветоноси.
phase.strawberry.midseason.name=Среден сезон
phase.strawberry.midseason.description=Цъфтеж, образуване и нарастване на плодове. Най-висока нужда от вода.
phase.strawberry.late.name=Късен сезон
phase.strawberry.late.description=Край на плододаването и подготовка за следващ цикъл.
phase.strawberry.unknown.name=Неизвестно
phase.strawberry.unknown.description=Няма информация.

phase.tomato.initial.name=Начален етап
phase.tomato.initial.description=Поникване, развитие на разсад и прихващане след разсаждане. Поддържай равномерна влажност и добра температура.
phase.tomato.development.name=Развитие на културата
phase.tomato.development.description=Интензивен растеж на листна маса и стъбла. Извършвай колтучене и привързване при необходимост. Осигури достатъчно хранителни вещества.
phase.tomato.midseason.name=Среден сезон
phase.tomato.midseason.description=Цъфтеж, формиране и нарастване на плодовете. Това е периодът с най-висока нужда от вода. Поддържай постоянна влажност.
phase.tomato.late.name=Късен сезон и узряване
phase.tomato.late.description=Плодовете узряват и достигат търговска зрелост. Намалявай постепенно поливките, за да ограничиш напукването.
phase.tomato.unknown.name=Неизвестно
phase.tomato.unknown.description=Няма информация.
